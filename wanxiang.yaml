fuzhu_kong: 
  __append: 
    - xform/^(.*?)(\d?);.*$/$1/ 
fuzhu_flypy:   ####################################词典格式: pinyin;flypy_code
  __append:
#双拼基础（无辅码）
    - derive/^(.*?)(\d?);.*$/$1/        # 纯双拼
    - derive/^(.*?)(\d?);.*$/$1$2/      # 双拼+声调
#第一组: 主flypy码（分号后第一位起）
    - derive/^(.*?)(\d?);(\w).*$/$1$3/            # 双拼+1位辅码
    # - derive|^(.*?)(\d?);(\w).*$|$1$2$3|          # 双拼+声调+1位辅码
    # - derive|^(.*?)(\d?);(\w).*$|$1$3$2|          # 双拼+1位辅码+声调
    - abbrev/^(.*?)(\d?);(\w)(\w).*$/$1$3$4/      # 双拼+2位辅码
    # - derive|^(.*?)(\d?);(\w)(\w).*$|$1$3$4$2|    # 双拼+2位辅码+声调
    # - derive|^(.*?)(\d?);(\w)(\w).*$|$1$2$3$4|    # 双拼+声调+2位辅码
    # - derive|^(.*?)(\d?);(\w)(\w).*$|$1$3$2$4|    # 双拼+1位辅码+声调+1位辅码
    - derive|^(.*?)(\d?);(\w)(\w).*$|$1$3$4/|     # 双拼+2位辅码+/
    - derive|^(.*?)(\d?);(\w)(\w).*$|$1$3$4o|     # 双拼+2位辅码+o
#第二组: 替代flypy码（分号后逗号分隔的备选码，如 vv,sl）
    - derive/^(.*?)(\d?);.*?,(\w).*$/$1$3/          # 双拼+备选1位辅码
    # - derive|^(.*?)(\d?);.*?,(\w).*$|$1$2$3|        # 双拼+声调+备选1位辅码
    # - derive|^(.*?)(\d?);.*?,(\w).*$|$1$3$2|        # 双拼+备选1位辅码+声调
    - abbrev/^(.*?)(\d?);.*?,(\w)(\w).*$/$1$3$4/   # 双拼+备选2位辅码
    # - derive|^(.*?)(\d?);.*?,(\w)(\w).*$|$1$3$4$2| # 双拼+备选2位辅码+声调
    # - derive|^(.*?)(\d?);.*?,(\w)(\w).*$|$1$2$3$4| # 双拼+声调+备选2位辅码
    # - derive|^(.*?)(\d?);.*?,(\w)(\w).*$|$1$3$2$4| # 双拼+备选1位辅码+声调+1位
    - derive|^(.*?)(\d?);.*?,(\w)(\w).*$|$1$3$4/|  # 双拼+备选2位辅码+/
    - derive|^(.*?)(\d?);.*?,(\w)(\w).*$|$1$3$4o|  # 双拼+备选2位辅码+o
#    - erase/^(.+);(.+)$/    # 删除原始编码加速检索
    - xform/◯/;/  # 还原分号保护

