wannengma:
  # 万能码 可选择性开启
  __append:
    - derive/^(\w\w)(\w)(\w)o$/$1$2`/  # ABC`
    - derive/^(\w\w)(\w)(\w)o$/$1`$3/  # AB`D
    - derive/^(\w\w)(\w)(\w)o$/$1``/   # AB``
    - derive/^(\w\w)(\w)(\w)o$/``$2$3/ # ``CD (FIXME: 这种情况目前和`直接上屏冲突)
