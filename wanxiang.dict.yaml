# Rime dictionary
# encoding: utf-8
# 
# rime配置的部署位置：
# ~/.local/share/fcitx5/rime 或者 ~/.config/ibus/rime  (Linux)
# ~/Library/Rime  (Mac OS)
# %APPDATA%\Rime  (Windows)
# 
#

---
name: wanxiang
version: "2025-03-01"
sort: by_weight  #字典初始排序，可選original或by_weight
use_preset_vocabulary: false
import_tables:
  - dicts/zi              #字表，包含了所有带拼音的汉字
  - dicts/jichu           #基础词库，2-4字词汇
  - dicts/lianxiang       #联想词库，5字以上词汇，多用于输入前半段第二候选可以出来整段
  - dicts/cuoyin          #错音错字，支持错音和错字输入的兼容，同时供超级注释lua使用会在输入错误音节打出的时候给予提示
  - dicts/duoyin          #兼容词库，是基础词库的扩充，收录了多场景多种读音的词组
  # - dicts/shici           #诗词
  # - dicts/diming          #地名
  # - dicts/yixue           #医学
  # - dicts/huaxue          #化学
  # - dicts/yaopin          #药品
  - dicts/mingren         #名人
  - dicts/yiren           #艺人
  # - dicts/wuzhong         #物种多样性
  - dicts/renming         #高频人名
  # - dicts/taifeng         #最新台风表
  - dicts/fangyan         #收集全国方言

  # 维基词库 https://github.com/felixonmars/fcitx5-pinyin-zhwiki、https://github.com/outloudvi/mw2fcitx
  # https://github.com/suiginko/moetype
  # 细胞词库 https://github.com/Bambooin/rimerc
  # 细胞词库 https://github.com/thunlp/THUOCL
  # - dicts/cell/moegirl
  - dicts/cell/tone_moe
  - dicts/cell/luna_pinyin.computer
  - dicts/cell/sogou_net
...


